<header class="site-header">
  <div class="site-header-inner">
    <a class="site-mark" href="{{ "/" | relative_url }}">{{ site.title }}</a>

    <nav class="site-nav" aria-label="Primary">
      <a href="{{ "/#about" | relative_url }}">about</a>
      <a href="{{ "/research/" | relative_url }}">research</a>
      <a href="{{ "/publications/" | relative_url }}">publications</a>
      <a href="{{ "/software/" | relative_url }}">software</a>
      <a href="{{ "/talks/" | relative_url }}">talks</a>
      {% if site.cv_link %}
      <a href="{{ site.cv_link | relative_url }}" target="_blank" rel="noopener">CV</a>
      {% endif %}
    </nav>

    <button class="menu-toggle" type="button" data-menu-toggle aria-expanded="false" aria-controls="site-menu">
      menu↑
    </button>
  </div>
</header>
